<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRMC — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css?v=1">
  <link rel="stylesheet" href="css/base.css?v=1">
  <link rel="stylesheet" href="css/components.css?v=1">
</head>
<body class="login-body">

  <main class="login-screen">
    <form class="login-card" id="login-form" novalidate>
      <h1 class="login-title">FRMC</h1>
      <p class="login-sub">Entre com seu email e senha</p>

      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input type="email" id="login-email" class="form-ctrl" placeholder="seu@email.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-senha">Senha</label>
        <input type="password" id="login-senha" class="form-ctrl" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
      <p class="login-error" id="login-error" hidden></p>
    </form>
  </main>

  <script src="js/env-config.js?v=1"></script>
  <script type="module">
    import { login, getSession } from './js/auth.js?v=1';

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');

    getSession().then((session) => {
      if (session) window.location.href = 'app/dashboard.html';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;

      try {
        await login(email, senha);
        window.location.href = 'app/dashboard.html';
      } catch (err) {
        errorEl.textContent = 'Email ou senha inválidos.';
        errorEl.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
