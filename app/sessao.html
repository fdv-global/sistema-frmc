<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRMC — Sessão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css?v=2">
  <link rel="stylesheet" href="../css/base.css?v=2">
  <link rel="stylesheet" href="../css/components.css?v=3">
</head>
<body class="bg-frmc">

  <div class="app-shell">
    <aside class="sidebar">
      <span class="app-brand">FRMC</span>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="pill-nav active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/>
            <circle cx="10" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Coachees</span>
        </a>
        <a href="admin.html" class="pill-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Admin</span>
        </a>
      </nav>
      <button type="button" class="pill-nav pill-nav--logout" id="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sair</span>
      </button>
    </aside>

    <div class="app-content">
      <header class="topbar">
        <div class="search-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="search-placeholder">Buscar coachee…</span>
        </div>
        <div class="topbar-actions">
          <button type="button" class="icon-pill" aria-label="Notificações">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
          <div class="user-pill">
            <span class="user-avatar" id="user-avatar">--</span>
            <span class="user-name" id="user-name">Coach</span>
          </div>
        </div>
      </header>

      <main class="app-main">
        <div class="session-header">
          <a href="dashboard.html" class="session-back">← Coachees</a>
          <h1 id="session-coachee-nome">Carregando…</h1>
          <p class="session-meta" id="session-meta"></p>
        </div>

        <p id="session-error" class="empty-state" hidden></p>

        <div id="rv-content" hidden>
          <div class="rv-mode-toggle" role="tablist">
            <button type="button" class="rv-mode-btn is-active" data-mode="grade" role="tab" aria-selected="true">Resposta Rápida</button>
            <button type="button" class="rv-mode-btn" data-mode="quiz" role="tab" aria-selected="false">Quiz</button>
          </div>

          <div class="rv-layout">
            <div class="rv-panel-col">
              <form class="rv-panel rv-form" id="rv-form" novalidate>
                <div class="rv-rows" id="rv-rows"></div>
                <div class="rv-actions">
                  <button type="submit" class="btn-primary" id="btn-salvar-rv">Salvar</button>
                  <span class="rv-validation-msg" id="rv-validation-msg" hidden></span>
                </div>
              </form>

              <div class="rv-panel rv-quiz" id="rv-quiz" hidden>
                <div class="rv-quiz-progress">
                  <div class="rv-quiz-progress-bar">
                    <div class="rv-quiz-progress-fill" id="rv-quiz-progress-fill"></div>
                  </div>
                  <span class="badge badge--neutral" id="rv-quiz-badge"></span>
                </div>

                <div class="rv-quiz-header">
                  <span class="rv-icon" id="rv-quiz-icon"></span>
                  <h2 id="rv-quiz-titulo"></h2>
                </div>

                <details class="rv-quiz-details" open>
                  <summary>O que é isso?</summary>
                  <p id="rv-quiz-definicao"></p>
                </details>

                <details class="rv-quiz-details">
                  <summary>Perguntas de apoio</summary>
                  <ul id="rv-quiz-perguntas"></ul>
                </details>

                <div class="rv-quiz-fields">
                  <div class="rv-field">
                    <span class="rv-field-label">Atual</span>
                    <input type="number" min="0" max="10" step="1" class="rv-input" id="rv-quiz-atual" data-campo="atual" required>
                  </div>
                  <div class="rv-field">
                    <span class="rv-field-label">Desejado</span>
                    <input type="number" min="0" max="10" step="1" class="rv-input" id="rv-quiz-desejado" data-campo="desejado" required>
                  </div>
                </div>

                <span class="rv-validation-msg" id="rv-quiz-validation-msg" hidden></span>

                <div class="rv-quiz-nav">
                  <button type="button" class="btn-ghost" id="rv-quiz-prev">← Anterior</button>
                  <button type="button" class="btn-primary" id="rv-quiz-next">Próximo pilar →</button>
                </div>
              </div>
            </div>

            <div class="rv-side">
              <div class="rv-panel">
                <div class="rv-radar-wrap">
                  <svg id="rv-radar" class="rv-radar" viewBox="-60 -20 440 360"></svg>
                </div>
                <div class="rv-radar-legend">
                  <span><span class="rv-swatch rv-swatch--atual"></span> Atual</span>
                  <span><span class="rv-swatch rv-swatch--desejado"></span> Desejado</span>
                </div>
              </div>

              <div class="rv-panel rv-classificacao" id="rv-classificacao" hidden>
                <div class="rv-classificacao-info">
                  <span class="rv-classificacao-label" id="rv-classificacao-label"></span>
                  <span class="rv-classificacao-media" id="rv-classificacao-media"></span>
                </div>
                <button type="button" class="btn-ghost" id="btn-exportar-pdf" disabled>Exportar PDF</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/env-config.js?v=2"></script>
  <script type="module">
    import { requireSession, logout } from '../js/auth.js?v=2';
    import { coacheeInitials } from '../js/coachees.js?v=2';
    import {
      AREAS_RODA_VIDA,
      CLASSIFICACAO_INFO,
      getSessaoComContexto,
      getAvaliacaoRodaVida,
      salvarAvaliacaoRodaVida,
      isNotaValida,
      renderRadarSvgContent,
    } from '../js/sessoes.js?v=1';
    import { exportarRodaVidaPdf } from '../js/roda-vida-pdf.js?v=1';
    import { CONTEUDO_PILARES } from '../js/roda-vida-conteudo.js?v=1';

    const params = new URLSearchParams(window.location.search);
    const sessaoId = params.get('sessao_id');

    const rowsEl = document.getElementById('rv-rows');
    const contentEl = document.getElementById('rv-content');
    const errorEl = document.getElementById('session-error');
    const radarEl = document.getElementById('rv-radar');
    const validationMsgEl = document.getElementById('rv-validation-msg');
    const btnSalvar = document.getElementById('btn-salvar-rv');
    const btnExportar = document.getElementById('btn-exportar-pdf');
    const classificacaoEl = document.getElementById('rv-classificacao');
    const classificacaoLabelEl = document.getElementById('rv-classificacao-label');
    const classificacaoMediaEl = document.getElementById('rv-classificacao-media');

    const gridFormEl = document.getElementById('rv-form');
    const quizEl = document.getElementById('rv-quiz');
    const quizValidationMsgEl = document.getElementById('rv-quiz-validation-msg');
    const quizPrevBtn = document.getElementById('rv-quiz-prev');
    const quizNextBtn = document.getElementById('rv-quiz-next');
    const quizAtualInput = document.getElementById('rv-quiz-atual');
    const quizDesejadoInput = document.getElementById('rv-quiz-desejado');

    let ultimaAvaliacaoSalva = null;
    let quizIndex = 0;

    // Estado central de valores — compartilhado pelos dois modos (grade e
    // quiz), garantindo que alternar a aba nunca perca o que já foi digitado.
    const valores = {};
    for (const { key } of AREAS_RODA_VIDA) {
      valores[key] = { atual: null, desejado: null };
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function formatarData(valor) {
      if (!valor) return '—';
      const d = new Date(valor);
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('pt-BR');
    }

    function montarLinhasFormulario() {
      rowsEl.innerHTML = AREAS_RODA_VIDA.map(
        (area) => `
          <div class="rv-row" data-area="${area.key}">
            <span class="rv-icon"><svg viewBox="0 0 24 24">${area.icon}</svg></span>
            <span class="rv-label">${area.label}</span>
            <div class="rv-field">
              <span class="rv-field-label">Atual</span>
              <input type="number" min="0" max="10" step="1" class="rv-input" data-key="${area.key}" data-campo="atual" required value="${valores[area.key].atual ?? ''}">
            </div>
            <div class="rv-field">
              <span class="rv-field-label">Desejado</span>
              <input type="number" min="0" max="10" step="1" class="rv-input" data-key="${area.key}" data-campo="desejado" required value="${valores[area.key].desejado ?? ''}">
            </div>
          </div>
        `
      ).join('');
    }

    function validarFormularioGrade() {
      let valido = true;
      for (const { key } of AREAS_RODA_VIDA) {
        for (const campo of ['atual', 'desejado']) {
          const input = rowsEl.querySelector(`input[data-key="${key}"][data-campo="${campo}"]`);
          const ok = isNotaValida(valores[key][campo]);
          input.classList.toggle('invalid', !ok);
          if (!ok) valido = false;
        }
      }
      return valido;
    }

    function validarTodosPilares() {
      return AREAS_RODA_VIDA.every(
        ({ key }) => isNotaValida(valores[key].atual) && isNotaValida(valores[key].desejado)
      );
    }

    function atualizarRadar() {
      radarEl.innerHTML = renderRadarSvgContent(valores);
    }

    // ── Modo Quiz ──────────────────────────────────────────────────
    function pilarAtual() {
      return AREAS_RODA_VIDA[quizIndex];
    }

    function renderPilarAtual() {
      const area = pilarAtual();
      const conteudo = CONTEUDO_PILARES[area.key];

      document.getElementById('rv-quiz-icon').innerHTML = `<svg viewBox="0 0 24 24">${area.icon}</svg>`;
      document.getElementById('rv-quiz-titulo').textContent = area.label;
      document.getElementById('rv-quiz-badge').textContent = `Pilar ${quizIndex + 1} de ${AREAS_RODA_VIDA.length}`;
      document.getElementById('rv-quiz-definicao').textContent = conteudo?.definicao ?? '';
      document.getElementById('rv-quiz-perguntas').innerHTML = (conteudo?.perguntas ?? [])
        .map((pergunta) => `<li>${escapeHtml(pergunta)}</li>`)
        .join('');

      quizAtualInput.value = valores[area.key].atual ?? '';
      quizDesejadoInput.value = valores[area.key].desejado ?? '';
      quizAtualInput.classList.remove('invalid');
      quizDesejadoInput.classList.remove('invalid');

      quizPrevBtn.disabled = quizIndex === 0;
      quizNextBtn.textContent = quizIndex === AREAS_RODA_VIDA.length - 1 ? 'Finalizar' : 'Próximo pilar →';

      document.getElementById('rv-quiz-progress-fill').style.width =
        `${((quizIndex + 1) / AREAS_RODA_VIDA.length) * 100}%`;

      quizValidationMsgEl.hidden = true;
    }

    async function finalizarQuiz() {
      if (!validarTodosPilares()) {
        const idxInvalido = AREAS_RODA_VIDA.findIndex(
          ({ key }) => !isNotaValida(valores[key].atual) || !isNotaValida(valores[key].desejado)
        );
        if (idxInvalido !== -1) {
          quizIndex = idxInvalido;
          renderPilarAtual();
        }
        quizValidationMsgEl.textContent = 'Preencha todos os pilares com valores inteiros de 0 a 10.';
        quizValidationMsgEl.hidden = false;
        return;
      }
      quizValidationMsgEl.hidden = true;
      quizNextBtn.disabled = true;
      quizNextBtn.textContent = 'Salvando…';
      try {
        await salvarNoBanco();
      } catch (err) {
        quizValidationMsgEl.textContent = 'Erro ao salvar. Tente novamente.';
        quizValidationMsgEl.hidden = false;
      } finally {
        quizNextBtn.disabled = false;
        quizNextBtn.textContent = 'Finalizar';
      }
    }

    async function salvarNoBanco() {
      const avaliacaoSalva = await salvarAvaliacaoRodaVida(sessaoId, valores);
      ultimaAvaliacaoSalva = avaliacaoSalva;
      exibirClassificacao(avaliacaoSalva);
      return avaliacaoSalva;
    }

    // ── Toggle de modo (Resposta Rápida / Quiz) ─────────────────────
    function setModo(modo) {
      const isQuiz = modo === 'quiz';
      gridFormEl.hidden = isQuiz;
      quizEl.hidden = !isQuiz;
      document.querySelectorAll('.rv-mode-btn').forEach((btn) => {
        const ativo = btn.dataset.mode === modo;
        btn.classList.toggle('is-active', ativo);
        btn.setAttribute('aria-selected', String(ativo));
      });
      if (isQuiz) {
        renderPilarAtual();
      } else {
        montarLinhasFormulario();
      }
    }

    function exibirClassificacao(avaliacao) {
      if (!avaliacao || !avaliacao.classificacao) {
        classificacaoEl.hidden = true;
        btnExportar.disabled = true;
        return;
      }
      const info = CLASSIFICACAO_INFO[avaliacao.classificacao] || { label: avaliacao.classificacao, color: 'var(--color-text-inverse)' };
      classificacaoLabelEl.textContent = info.label;
      classificacaoLabelEl.style.color = info.color;
      classificacaoMediaEl.textContent = avaliacao.media_atual != null ? `Média atual: ${avaliacao.media_atual}` : '';
      classificacaoEl.hidden = false;
      btnExportar.disabled = false;
    }

    function preencherValores(avaliacao) {
      if (!avaliacao) return;
      for (const { key } of AREAS_RODA_VIDA) {
        valores[key].atual = avaliacao[`atual_${key}`];
        valores[key].desejado = avaliacao[`desejado_${key}`];
      }
    }

    async function init() {
      const session = await requireSession();
      if (!session) return;

      const email = session.user?.email ?? '';
      document.getElementById('user-name').textContent = email || 'Coach';
      document.getElementById('user-avatar').textContent = coacheeInitials(email.split('@')[0].replace(/[._-]+/g, ' '));

      document.getElementById('btn-logout').addEventListener('click', async () => {
        await logout();
        window.location.href = '../index.html';
      });

      if (!sessaoId) {
        document.getElementById('session-coachee-nome').textContent = 'Sessão não encontrada';
        errorEl.textContent = 'Nenhuma sessão informada na URL (?sessao_id=).';
        errorEl.hidden = false;
        return;
      }

      montarLinhasFormulario();
      atualizarRadar();

      rowsEl.addEventListener('input', (event) => {
        const input = event.target;
        if (!input.matches('input[data-key][data-campo]')) return;
        const { key, campo } = input.dataset;
        valores[key][campo] = input.value === '' ? null : Number(input.value);
        atualizarRadar();
      });

      quizEl.addEventListener('input', (event) => {
        const input = event.target;
        if (!input.matches('input[data-campo]')) return;
        const area = pilarAtual();
        valores[area.key][input.dataset.campo] = input.value === '' ? null : Number(input.value);
        atualizarRadar();
      });

      document.querySelectorAll('.rv-mode-btn').forEach((btn) => {
        btn.addEventListener('click', () => setModo(btn.dataset.mode));
      });

      quizPrevBtn.addEventListener('click', () => {
        if (quizIndex === 0) return;
        quizIndex -= 1;
        renderPilarAtual();
      });

      quizNextBtn.addEventListener('click', async () => {
        const area = pilarAtual();
        const ok = isNotaValida(valores[area.key].atual) && isNotaValida(valores[area.key].desejado);
        if (!ok) {
          quizAtualInput.classList.toggle('invalid', !isNotaValida(valores[area.key].atual));
          quizDesejadoInput.classList.toggle('invalid', !isNotaValida(valores[area.key].desejado));
          quizValidationMsgEl.textContent = 'Preencha as duas notas (0 a 10) antes de continuar.';
          quizValidationMsgEl.hidden = false;
          return;
        }
        if (quizIndex === AREAS_RODA_VIDA.length - 1) {
          await finalizarQuiz();
          return;
        }
        quizIndex += 1;
        renderPilarAtual();
      });

      let sessao;
      try {
        sessao = await getSessaoComContexto(sessaoId);
      } catch (err) {
        document.getElementById('session-coachee-nome').textContent = 'Erro ao carregar sessão';
        errorEl.textContent = 'Não foi possível carregar os dados desta sessão.';
        errorEl.hidden = false;
        return;
      }

      if (!sessao) {
        document.getElementById('session-coachee-nome').textContent = 'Sessão não encontrada';
        errorEl.textContent = 'Nenhuma sessão corresponde a este link.';
        errorEl.hidden = false;
        return;
      }

      const coachee = sessao.ciclos?.coachees ?? null;
      document.getElementById('session-coachee-nome').textContent = coachee?.nome_casual
        ? escapeHtml(coachee.nome_casual)
        : 'Coachee sem nome';
      document.getElementById('session-meta').textContent = `Sessão de ${formatarData(sessao.data)}`;

      contentEl.hidden = false;

      const avaliacaoExistente = await getAvaliacaoRodaVida(sessaoId).catch(() => null);
      if (avaliacaoExistente) {
        preencherValores(avaliacaoExistente);
        montarLinhasFormulario();
        atualizarRadar();
        ultimaAvaliacaoSalva = avaliacaoExistente;
        exibirClassificacao(avaliacaoExistente);
      }

      gridFormEl.addEventListener('submit', async (event) => {
        event.preventDefault();
        const valido = validarFormularioGrade();
        if (!valido) {
          validationMsgEl.textContent = 'Preencha todos os campos com valores inteiros de 0 a 10.';
          validationMsgEl.hidden = false;
          return;
        }
        validationMsgEl.hidden = true;

        btnSalvar.disabled = true;
        btnSalvar.textContent = 'Salvando…';
        try {
          await salvarNoBanco();
        } catch (err) {
          validationMsgEl.textContent = 'Erro ao salvar. Tente novamente.';
          validationMsgEl.hidden = false;
        } finally {
          btnSalvar.disabled = false;
          btnSalvar.textContent = 'Salvar';
        }
      });

      btnExportar.addEventListener('click', async () => {
        if (!ultimaAvaliacaoSalva) return;
        btnExportar.disabled = true;
        btnExportar.textContent = 'Gerando…';
        try {
          await exportarRodaVidaPdf({
            coacheeNome: coachee?.nome_casual || 'Coachee',
            sessaoData: formatarData(sessao.data),
            valores,
            media: ultimaAvaliacaoSalva.media_atual,
            classificacao: ultimaAvaliacaoSalva.classificacao,
            radarEl,
          });
        } finally {
          btnExportar.disabled = false;
          btnExportar.textContent = 'Exportar PDF';
        }
      });
    }

    init();
  </script>
</body>
</html>
