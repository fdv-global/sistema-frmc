<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRMC — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css?v=1">
  <link rel="stylesheet" href="../css/base.css?v=1">
  <link rel="stylesheet" href="../css/components.css?v=1">
</head>
<body class="bg-frmc">

  <div class="app-shell">
    <aside class="sidebar">
      <span class="app-brand">FRMC</span>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="pill-nav active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/>
            <circle cx="10" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Coachees</span>
        </a>
        <a href="admin.html" class="pill-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Admin</span>
        </a>
      </nav>
      <button type="button" class="pill-nav pill-nav--logout" id="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sair</span>
      </button>
    </aside>

    <div class="app-content">
      <header class="topbar">
        <div class="search-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="search-placeholder">Buscar coachee…</span>
        </div>
        <div class="topbar-actions">
          <button type="button" class="icon-pill" aria-label="Notificações">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
          <div class="user-pill">
            <span class="user-avatar" id="user-avatar">--</span>
            <span class="user-name" id="user-name">Coach</span>
          </div>
        </div>
      </header>

      <main class="app-main">
        <h1>Coachees</h1>
        <div id="coachees-list" class="coachees-grid" aria-live="polite"></div>
        <p id="coachees-empty" class="empty-state" hidden>Nenhum coachee vinculado ainda.</p>
      </main>
    </div>
  </div>

  <script src="../js/env-config.js?v=1"></script>
  <script type="module">
    import { requireSession, logout } from '../js/auth.js?v=1';
    import { listCoachees, coacheeInitials } from '../js/coachees.js?v=1';

    const listEl = document.getElementById('coachees-list');
    const emptyEl = document.getElementById('coachees-empty');

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function isSafeImageUrl(url) {
      try {
        const parsed = new URL(url, window.location.href);
        return parsed.protocol === 'https:' || parsed.protocol === 'http:';
      } catch {
        return false;
      }
    }

    function renderCoacheeCard(coachee) {
      const avatar = isSafeImageUrl(coachee.foto_url)
        ? `<img class="coachee-avatar" src="${escapeHtml(coachee.foto_url)}" alt="">`
        : `<span class="coachee-avatar coachee-avatar--initials">${escapeHtml(coacheeInitials(coachee.nome_casual))}</span>`;

      return `
        <a class="coachee-card" href="coachee.html?id=${encodeURIComponent(coachee.id)}">
          ${avatar}
          <div class="coachee-info">
            <span class="coachee-nome">${escapeHtml(coachee.nome_casual) || 'Sem nome'}</span>
            ${coachee.email ? `<span class="coachee-contato">${escapeHtml(coachee.email)}</span>` : ''}
            ${coachee.whatsapp ? `<span class="coachee-contato">${escapeHtml(coachee.whatsapp)}</span>` : ''}
          </div>
        </a>
      `;
    }

    async function init() {
      const session = await requireSession();
      if (!session) return;

      const email = session.user?.email ?? '';
      document.getElementById('user-name').textContent = email || 'Coach';
      document.getElementById('user-avatar').textContent = coacheeInitials(email.split('@')[0].replace(/[._-]+/g, ' '));

      document.getElementById('btn-logout').addEventListener('click', async () => {
        await logout();
        window.location.href = '../index.html';
      });

      try {
        const coachees = await listCoachees();
        if (!coachees.length) {
          emptyEl.hidden = false;
        } else {
          listEl.innerHTML = coachees.map(renderCoacheeCard).join('');
        }
      } catch (err) {
        emptyEl.textContent = 'Erro ao carregar coachees.';
        emptyEl.hidden = false;
      }
    }

    init();
  </script>
</body>
</html>
